theme: jekyll-theme-cayman

title: Claude Skills for GRC
description: >
  Expert-level compliance guidance for ISO 27001, SOC 2, FedRAMP, GDPR,
  and HIPAA — powered by Claude Skills.

# Exclude all standalone skill folders so Jekyll doesn't try to process
# binary .skill ZIP files. Add new skill folders here when adding a new skill.
exclude:
  - "CCPA - Claude Skill"
  - "CIS Controls - Claude Skill"
  - "CMMC - Claude Skill"
  - "CSRD - Claude Skill"
  - "DORA - Claude Skill"
  - "DPDPA - Claude Skill"
  - "EAR - Claude Skill"
  - "EU AI Act - Claude Skill"
  - "EU CRA - Claude Skill"
  - "FedRamp - Claude Skill"
  - "GDPR - Claude Skill"
  - "HIPAA - Claude Skill"
  - "ISM - Claude Skill"
  - "ISO 27001 - Claude Skill"
  - "ISO 27701 - Claude Skill"
  - "ISO 42001 - Claude Skill"
  - "ITAR - Claude Skill"
  - "LGPD - Claude Skill"
  - "NIS2 - Claude Skill"
  - "NIST 800-53 - Claude Skill"
  - "NIST AI RMF - Claude Skill"
  - "NIST Cybersecurity framework - Claude Skill"
  - "NZISM - Claude Skill"
  - "PCI Compliance - Claude Skill"
  - "SOC 2 - Claude Skill"
  - "SWIFT CSP - Claude Skill"
  - "Section 508 - Claude Skill"
  - "TSA Compliance - Claude Skill"
  - "Vietnam PDPL - Claude Skill"
  - "WCAG - Claude Skill"
  - plugins
  - tests
  - grc-workspace
  - "*.skill"

# Keep the eval HTML and images as static passthrough files
include:
  - "index.html"
  - "grc-skills-eval-results.html"
  - "Installing Skills in Claude.png"
