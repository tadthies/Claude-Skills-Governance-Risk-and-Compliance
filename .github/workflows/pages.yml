name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "_config.yml"
      - "*.png"
      - "*.html"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Allow the deploy-pages action to run under the new Node 24 default runner.
    # Remove once actions/deploy-pages ships a Node-24-native release.
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # Tolerate slow backend processing before declaring failure
        with:
          timeout: 900000        # 15 min (default 10)
          error_count: 15        # status-poll errors tolerated (default 10)
          reporting_interval: 10000

      # The Pages backend intermittently returns "Deployment failed, try
      # again later" for perfectly good artifacts. One automatic retry
      # after a cool-down absorbs the common transient case; a second
      # consecutive failure is real and still fails the workflow.
      - name: Wait before retry
        if: ${{ failure() && steps.deployment.outcome == 'failure' }}
        run: sleep 60

      - name: Retry deploy (transient Pages failures)
        if: ${{ failure() && steps.deployment.outcome == 'failure' }}
        id: deployment-retry
        uses: actions/deploy-pages@v4
        with:
          timeout: 900000
          error_count: 15
          reporting_interval: 10000
